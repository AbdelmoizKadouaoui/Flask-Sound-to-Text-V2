<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flask Voice Chatbot Offline</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="phone-shell">
    <section class="chat-card">
      <header class="chat-header">
        <div class="avatar">AI</div>
        <div class="header-text">
          <h1>Voice Chatbot</h1>
          <p id="statusText">Offline Flask · Vosk STT · Piper/Local TTS</p>
        </div>
        <select id="languageSelect" aria-label="Langue STT"></select>
      </header>

      <section id="chatWindow" class="chat-window" aria-live="polite">
        <div class="message assistant">
          <div class="bubble">
            Bonjour 👋 Écris un texte ou clique sur le micro. La réponse va répéter exactement le texte saisi ou détecté par la voix.
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="mic-zone">
          <button id="micButton" class="round-button" title="Enregistrer la voix" aria-label="Enregistrer la voix">
            <span id="micIcon">🎙️</span>
          </button>
          <div id="voiceWave" class="voice-wave" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <input id="messageInput" type="text" placeholder="Écris ton message..." autocomplete="off">

        <button id="sendButton" class="send-button" title="Envoyer" aria-label="Envoyer">
          ➤
        </button>

        <button id="speakButton" class="round-button speaker" title="Lire la dernière réponse" aria-label="Lire la dernière réponse">
          🔊
        </button>
      </footer>
    </section>
  </main>

  <script>
    window.APP_DEFAULT_LANG = "{{ default_lang }}";
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
